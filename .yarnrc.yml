defaultSemverRangePrefix: ""

enableGlobalCache: false

packageExtensions:
  "@eddeee888/gcg-typescript-resolver-files@*":
    dependencies:
      graphql-scalars: "*"
  "@pixi/react@*":
    dependencies:
      "@pixi/app": "*"
      "@pixi/constants": "*"
      "@pixi/core": "*"
      "@pixi/display": "*"
      "@pixi/graphics": "*"
      "@pixi/math": "*"
      "@pixi/mesh-extras": "*"
      "@pixi/particle-container": "*"
      "@pixi/sprite": "*"
      "@pixi/sprite-animated": "*"
      "@pixi/sprite-tiling": "*"
      "@pixi/text": "*"
      "@pixi/text-bitmap": "*"
      "@pixi/ticker": "*"
  debug@*:
    dependencies:
      supports-color: "*"
  drizzle-kit@*:
    dependencies:
      pg: "*"
      drizzle-orm: "*"
  drizzle-orm@*:
    dependencies:
      pg: "*"
  node-fetch@*:
    dependencies:
      encoding: "*"
  vite@*:
    dependencies:
      supports-color: "*"
  "@tanstack/router-devtools-core@*":
    dependencies:
      tiny-invariant: "*"
      "@tanstack/router-core": "*"

pnpFallbackMode: all

pnpMode: loose

supportedArchitectures:
  cpu:
    - x64
    - arm64
  libc:
    - musl
    - glibc
  os:
    - win32
    - linux
    - darwin

yarnPath: .yarn/releases/yarn-4.6.0.cjs
