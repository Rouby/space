name: 🚀 Deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  lint:
    name: ⬣ Lint
    runs-on: ubuntu-latest

    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 📥 Install deps
        run: yarn install --immutable --immutable-cache

      - name: 🔬 Lint
        run: yarn lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest

    concurrency:
      group: typecheck-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 📥 Install deps
        run: yarn install --immutable --immutable-cache

      - name: 🔎 Type check
        run: yarn typecheck

  test:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest

    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 📥 Install deps
        run: yarn install --immutable --immutable-cache

      - name: 🧪 Run vitest
        run: yarn test -- --coverage

  integration:
    name: 🔗 Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    concurrency:
      group: integration-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 📥 Install deps
        run: |
          yarn install --immutable --immutable-cache
          yarn workspace @space/integration playwright install --with-deps

      - name: 🔗 Run tests
        run: yarn integrate
        env:
          JWT_SECRET: kitty
          LOG_LEVEL: trace

      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/integration/playwright-report/
          retention-days: 30

  build:
    name: 🏗️ Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    concurrency:
      group: build-${{ matrix.image }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: packages/backend/Dockerfile
            context: .
          - image: frontend
            dockerfile: packages/frontend/Dockerfile
            context: packages/frontend/dist
            prebuild: yarn workspace @space/frontend build
          - image: migrations
            dockerfile: packages/data/Dockerfile
            context: .

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🏷️ Sanitize ref name for Docker tag
        id: sanitize
        run: echo "ref_name=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: ⎔ Setup node
        if: matrix.prebuild
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 📥 Install deps
        if: matrix.prebuild
        run: yarn install --immutable --immutable-cache

      - name: 🔨 Pre-build
        if: matrix.prebuild
        run: ${{ matrix.prebuild }}

      - name: ⚡️ Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-${{ matrix.image }}-cache
          key: ${{ runner.os }}-buildx-${{ matrix.image }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.image }}-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Docker build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/rouby/space-${{ matrix.image }}:latest
            ghcr.io/rouby/space-${{ matrix.image }}:${{ steps.sanitize.outputs.ref_name }}-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-${{ matrix.image }}-cache
          cache-to: type=local,dest=/tmp/.buildx-${{ matrix.image }}-cache-new,mode=max

      - # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        name: Move cache
        run: |
          rm -rf /tmp/.buildx-${{ matrix.image }}-cache
          mv /tmp/.buildx-${{ matrix.image }}-cache-new /tmp/.buildx-${{ matrix.image }}-cache

  deploy:
    name: 🚀 Deploy
    runs-on: arc-runner-set-space
    container: ghcr.io/actions/actions-runner:latest
    needs:
      - lint
      - typecheck
      - test
      - integration
      - build

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    strategy:
      matrix:
        env_name: [staging, production]

    concurrency:
      group: deploy-${{ matrix.env_name }}
      # allow cancel if not reviewed
      cancel-in-progress: ${{ matrix.env_name == 'production' }}

    environment:
      name: ${{ matrix.env_name }}
      url: "https://${{ matrix.env_name == 'staging' && 'staging.' || '' }}space.aiacta.com"

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 📥 Install kubectl and helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh
      - name: 🚀 Deploy
        run: |
          export JWT_SECRET=$(echo -n '${{ secrets.JWT_SECRET }}' | iconv -t utf-8 | base64 -w 0)
          export APP_ORIGIN=$(echo -n "https://${{ matrix.env_name == 'staging' && 'staging.' || '' }}space.aiacta.com" | iconv -t utf-8 | base64 -w 0)

          helm upgrade space -n "space-${{ matrix.env_name }}" --install --create-namespace \
              --set image.repository=ghcr.io/rouby/space \
              --set "image.tag=${{ github.ref_name }}-${{ github.sha }}" \
              --set "ingress.host=${{ matrix.env_name == 'staging' && 'staging.' || '' }}space.aiacta.com" \
              --set ingress.clusterIssuer=letsencrypt-prod \
              --set "ingress.tls[0].hosts={${{ matrix.env_name == 'staging' && 'staging.' || '' }}space.aiacta.com}" \
              --set ingress.tls[0].secretName=space-tls \
              --set-string "secrets.JWT_SECRET=$JWT_SECRET" \
              --set-string "secrets.APP_ORIGIN=$APP_ORIGIN" \
              ./helm
