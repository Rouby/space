type ShipDesign {
	id: ID!
	name: String!
	description: String!
	owner: Player!
	components: [ShipDesignComponent!]!
	decommissioned: Boolean!
	costs: [ResourceCost!]!
}

type ShipDesignComponent {
	id: ID!
	component: ShipComponent!
	position: Vector!
}

extend type Game {
	shipDesigns: [ShipDesign!]!
}

extend type Player {
	shipDesigns: [ShipDesign!]!
}

input ShipDesignInput {
	name: String!
	description: String!
	components: [ShipDesignComponentInput!]!
}

input ShipDesignComponentInput {
	componentId: ID!
	gridPosition: Vector!
}

type Mutation {
	createShipDesign(gameId: ID!, design: ShipDesignInput!): ShipDesign!
}
