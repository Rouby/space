type Dilemma {
	id: ID!
	title: String!
	description: String!
	question: String!
	choices: [DilemmaChoice!]!
	choosen: ID
	position: Vector
	correlation: Reference
	causation: Reference
}

type DilemmaChoice {
	id: ID!
	title: String!
	description: String!
}

extend type Game {
	dilemmas: [Dilemma!]!
}

extend type Query {
	dilemma(id: ID!): Dilemma!
}

extend type Mutation {
	makeDilemmaChoice(dilemmaId: ID!, choiceId: ID!): Dilemma!
}

union Reference = StarSystem | Dilemma
