type StarSystem implements Positionable {
	id: ID!
	name: String!
	position: Vector!
	owner: Player
	industrialProjects: [IndustrialProject!]!
	completedIndustrialProjects: [IndustrialProject!]!
	currentDevelopmentStance: DevelopmentStance
	nextTurnStanceProjection: DevelopmentStanceProjection
	colonization: StarSystemColonization
	sensorRange: Float
	discoveries: [Discovery!]
	discoveryProgress: Float
	populations: [Population!]
	industry: Int
	isVisible: Boolean!
	lastUpdate: DateTime
}

type StarSystemColonization {
	player: Player!
	originStarSystem: StarSystem!
	turnsRequired: Int!
	startedAtTurn: Int!
	dueTurn: Int!
	turnsRemaining: Int!
}

union Discovery = ResourceDiscovery | UnknownDiscovery

type ResourceDiscovery {
	id: ID!
	resource: Resource!
	remainingDeposits: Float!
	miningRate: Float!
}

type UnknownDiscovery {
	id: ID!
}

type Population {
	id: ID!
	amount: BigInt!
}

enum DevelopmentStance {
	industrialize
	balance
	grow_population
}

type DevelopmentStanceProjection {
	industryDelta: Int!
	populationDelta: BigInt!
}

enum IndustrialProjectType {
	factory_expansion
	automation_hub
	orbital_foundry
}

type IndustrialProject {
	id: ID!
	projectType: IndustrialProjectType!
	industryPerTurn: Int!
	workRequired: Int!
	workDone: Int!
	completionIndustryBonus: Int!
	queuePosition: Int!
	queuedAtTurn: Int!
	startedAtTurn: Int
	completedAtTurn: Int
	turnsRemaining: Int!
	etaTurns: Int!
}

extend type Game {
	starSystems: [StarSystem!]!
}

type Query {
	starSystem(id: ID!): StarSystem!
}

extend type Mutation {
	startColonization(starSystemId: ID!): StarSystem!
	setDevelopmentStance(
		starSystemId: ID!
		stance: DevelopmentStance!
	): StarSystem!
	queueIndustrialProject(
		starSystemId: ID!
		projectType: IndustrialProjectType!
	): StarSystem!
}
